{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=0" name="viewport"/>
<title>ERP Login</title>
<!-- Favicon -->
<link href="{% static 'assets/images/favicon_ed329702.png' %}" rel="shortcut icon" type="image/x-icon"/>
<!-- Bootstrap CSS -->
<link href="{% static 'assets/css/bootstrap.min_91a1c12a.css' %}" rel="stylesheet"/>
<!-- Feather CSS -->
<link href="{% static 'assets/css/feather_b43af4d6.css' %}" rel="stylesheet"/>
<!-- Tabler Icon CSS -->
<link href="{% static 'assets/css/tabler-icons_a806d5f8.css' %}" rel="stylesheet"/>
<!-- Fontawesome CSS -->
<link href="{% static 'assets/css/fontawesome.min_4fb33415.css' %}" rel="stylesheet"/>
<link href="{% static 'assets/css/all.min_10215c55.css' %}" rel="stylesheet"/>
<!-- Main CSS -->
<link href="{% static 'assets/css/style_0313db4e.css' %}" rel="stylesheet"/>
</head>
<body class="account-page">
<div class="main-wrapper">
<div class="container-fuild">
<div class="login-wrapper w-100 overflow-hidden position-relative flex-wrap d-block vh-100">
<div class="row">

    <!-- Left Side Illustration -->
    <div class="col-lg-6">
        <div class="d-lg-flex align-items-center justify-content-center bg-light-300 d-lg-block d-none flex-wrap vh-100 overflowy-auto bg-01">
            <div>
                <img alt="Img" src="{% static 'assets/images/authentication-06_8b9bff81.svg' %}"/>
            </div>
        </div>
    </div>

    <!-- Right Side Login Form -->
    <div class="col-lg-6 col-md-12 col-sm-12">
        <div class="row justify-content-center align-items-center vh-100 overflow-auto flex-wrap">
            <div class="col-md-8 mx-auto p-4">

                <form method="POST" action="{% url 'login_view' %}">
                    {% csrf_token %}
                    <div>
                        <!-- Logo -->
                        <div class="mx-auto mb-5 text-center">
                            <img alt="Logo" class="img-fluid" src="{% static 'assets/images/authentication-logo_84df6bc7.svg' %}"/>
                        </div>

                        <div class="card">
                            <div class="card-body p-4">

                                <!-- Title -->
                                <h2 class="mb-2">Sign In</h2>
<p class="mb-0">Enter your credentials to access the system</p>

                                <!-- Error Message -->
                                {% if error %}
                                <div class="alert alert-danger d-flex align-items-center mb-3">
                                    <i class="ti ti-alert-circle me-2"></i>
                                    {{ error }}
                                </div>
                                {% endif %}

                                <!-- Username -->
                                <div class="mb-3">
                                    <label class="form-label">Email Address</label>
                                    <div class="input-icon mb-3 position-relative">
                                        <span class="input-icon-addon">
                                            <i class="ti ti-user"></i>
                                        </span>
                                        <input 
                                            class="form-control" 
                                            type="email" 
                                            name="email"
                                            placeholder="Enter your email address"
                                            required
                                        />
                                    </div>

                                    <!-- Password -->
                                    <label class="form-label">Password</label>
                                    <div class="pass-group">
                                        <input 
                                            class="pass-input form-control" 
                                            type="password"
                                            name="password"
                                            placeholder="Enter your password"
                                            required
                                        />
                                        <span class="ti toggle-password ti-eye-off"></span>
                                    </div>
                                </div>

                                <!-- Remember Me + Forgot Password -->
                                <div class="form-wrap form-wrap-checkbox mb-3">
                                    <div class="d-flex align-items-center">
                                        <div class="form-check form-check-md mb-0">
                                            <input class="form-check-input mt-0" type="checkbox" name="remember_me"/>
                                        </div>
                                        <p class="ms-1 mb-0">Remember Me</p>
                                    </div>
                                    <div class="text-end">
                                        <a class="link-danger" href="#">Forgot Password?</a>
                                    </div>
                                </div>

                                <!-- Sign In Button -->
                                <div class="mb-3">
                                    <button class="btn btn-primary w-100" type="submit">
                                        Sign In
                                    </button>
                                </div>

                            </div>
                        </div>

                        <!-- Footer -->
                        <div class="mt-5 text-center">
                            <p class="mb-0">Copyright © 2026 - ERP System</p>
                        </div>

                    </div>
                </form>

            </div>
        </div>
    </div>

</div>
</div>
</div>
</div>

<!-- jQuery -->
<script src="{% static 'assets/js/jquery-3.7.1.min_773d5883.js' %}"></script>
<!-- Bootstrap Core JS -->
<script src="{% static 'assets/js/bootstrap.bundle.min_1e76a792.js' %}"></script>
<!-- Feather Icon JS -->
<script src="{% static 'assets/js/feather.min_f08732de.js' %}"></script>
<!-- Slimscroll JS -->
<script src="{% static 'assets/js/jquery.slimscroll.min_56d615e4.js' %}"></script>
<!-- Custom JS -->
<script src="{% static 'assets/js/script_2e4942ff.js' %}"></script>
</body>
</html>
